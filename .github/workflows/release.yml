name: Build Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  runtime-key:
    name: Resolve native runtime key
    runs-on: ubuntu-latest
    outputs:
      key: ${{ steps.key.outputs.key }}
      tag: ${{ steps.key.outputs.tag }}

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Resolve key
        id: key
        shell: bash
        run: |
          key="$(scripts/native-runtime-key.sh)"
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "tag=native-$key" >> "$GITHUB_OUTPUT"
          echo "Native runtime key: $key"

  runtime-release:
    name: Ensure native runtime cache release
    runs-on: ubuntu-latest
    needs: runtime-key
    if: github.event_name != 'pull_request'

    steps:
      - name: Create cache release if missing
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RUNTIME_TAG: ${{ needs.runtime-key.outputs.tag }}
          RUNTIME_KEY: ${{ needs.runtime-key.outputs.key }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RUNTIME_TAG" >/dev/null 2>&1; then
            echo "Native runtime cache release exists: $RUNTIME_TAG"
          else
            gh release create "$RUNTIME_TAG" \
              --target "$GITHUB_SHA" \
              --title "Native runtimes $RUNTIME_KEY" \
              --notes "Cached libpag native runtimes for $RUNTIME_KEY." \
              --prerelease
          fi

  linux-runtime:
    name: Build Linux x86_64 runtime
    runs-on: ubuntu-latest
    needs:
      - runtime-key
      - runtime-release

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download cached Linux runtime
        id: cache
        env:
          GH_TOKEN: ${{ github.token }}
          RUNTIME_TAG: ${{ needs.runtime-key.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          asset="native-linux-x86_64.zip"
          mkdir -p build/native-cache
          if gh release download "$RUNTIME_TAG" --pattern "$asset" --dir build/native-cache --clobber; then
            unzip -q "build/native-cache/$asset" -d build/native-runtimes
            test -f build/native-runtimes/linux-x86_64/libpag.so
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "Using cached Linux runtime from $RUNTIME_TAG"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
            echo "Linux runtime cache miss for $RUNTIME_TAG"
          fi

      - name: Install native build dependencies
        if: steps.cache.outputs.hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libegl1-mesa-dev \
            libgles2-mesa-dev \
            libgl1-mesa-dev \
            libx11-dev \
            ninja-build \
            nodejs \
            npm \
            pkg-config \
            yasm

      - name: Build libpag shared library
        if: steps.cache.outputs.hit != 'true'
        run: scripts/build-libpag-runtime.sh linux x86_64

      - name: Publish Linux runtime cache
        if: steps.cache.outputs.hit != 'true' && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          RUNTIME_TAG: ${{ needs.runtime-key.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          (cd build/native-runtimes && zip -qr "$GITHUB_WORKSPACE/native-linux-x86_64.zip" linux-x86_64)
          gh release upload "$RUNTIME_TAG" native-linux-x86_64.zip --clobber

      - name: Upload Linux runtime
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x86_64
          path: build/native-runtimes/linux-x86_64/libpag.so
          if-no-files-found: error

  windows-runtime:
    name: Build Windows x86_64 runtime
    runs-on: windows-latest
    needs:
      - runtime-key
      - runtime-release

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Download cached Windows runtime
        id: cache
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RUNTIME_TAG: ${{ needs.runtime-key.outputs.tag }}
        run: |
          $ErrorActionPreference = "Stop"
          $asset = "native-windows-x86_64.zip"
          New-Item -ItemType Directory -Force -Path "build/native-cache" | Out-Null
          try {
              gh release download $env:RUNTIME_TAG --pattern $asset --dir "build/native-cache" --clobber
              if ($LASTEXITCODE -ne 0) {
                  throw "download failed"
              }
              Expand-Archive -Path "build/native-cache/$asset" -DestinationPath "build/native-runtimes" -Force
              if (-not (Test-Path "build/native-runtimes/windows-x86_64/pag.dll")) {
                  throw "Cached Windows runtime is missing pag.dll"
              }
              "hit=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "Using cached Windows runtime from $env:RUNTIME_TAG"
          } catch {
              "hit=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "Windows runtime cache miss for $env:RUNTIME_TAG"
          }

      - name: Set up Node.js
        if: steps.cache.outputs.hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install native build tools
        if: steps.cache.outputs.hit != 'true'
        shell: pwsh
        run: choco install yasm -y --no-progress

      - name: Build libpag shared library
        if: steps.cache.outputs.hit != 'true'
        shell: pwsh
        run: ./scripts/build-libpag-runtime.ps1 -Arch x64

      - name: Publish Windows runtime cache
        if: steps.cache.outputs.hit != 'true' && github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RUNTIME_TAG: ${{ needs.runtime-key.outputs.tag }}
        run: |
          Compress-Archive -Path "build/native-runtimes/windows-x86_64" -DestinationPath "native-windows-x86_64.zip" -Force
          gh release upload $env:RUNTIME_TAG native-windows-x86_64.zip --clobber

      - name: Upload Windows runtime
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x86_64
          path: build/native-runtimes/windows-x86_64/pag.dll
          if-no-files-found: error

  package:
    name: Build complete plugin ZIP
    runs-on: ubuntu-latest
    needs:
      - linux-runtime
      - windows-runtime

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Download Linux runtime
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x86_64
          path: build/downloaded-runtimes/linux-x86_64

      - name: Download Windows runtime
        uses: actions/download-artifact@v4
        with:
          name: native-windows-x86_64
          path: build/downloaded-runtimes/windows-x86_64

      - name: Stage complete native runtime set
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p \
            src/main/resources/native/linux-x86_64 \
            src/main/resources/native/windows-x86_64
          cp build/downloaded-runtimes/linux-x86_64/libpag.so src/main/resources/native/linux-x86_64/libpag.so
          cp build/downloaded-runtimes/windows-x86_64/pag.dll src/main/resources/native/windows-x86_64/pag.dll
          test -f src/main/resources/native/macos-aarch64/libpag.dylib
          find src/main/resources/native -maxdepth 2 -type f | sort

      - name: Build and test
        run: ./gradlew --no-daemon -PuseRemotePlatform=true test buildPlugin verifyPluginStructure

      - name: Verify plugin ZIP
        run: scripts/verify-release-zip.sh build/distributions/pag-viewer-plugin-$(awk -F= '/^pluginVersion=/ {print substr($0, index($0, "=") + 1)}' gradle.properties).zip macos-aarch64,linux-x86_64,windows-x86_64

      - name: Read plugin version
        id: version
        shell: bash
        run: |
          version="$(awk -F= '/^pluginVersion=/ {print substr($0, index($0, "=") + 1)}' gradle.properties)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "zip_path=build/distributions/pag-viewer-plugin-$version.zip" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pag-viewer-plugin-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.zip_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
          ZIP_PATH: ${{ steps.version.outputs.zip_path }}
        shell: bash
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ZIP_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$ZIP_PATH" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
